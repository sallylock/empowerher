<!DOCTYPE html>
<html>
<head>
  <title>EM-POWER HER</title>

  <!-- 🔥 세련된 폰트 -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background-color: #0a0a8f; /* 더 고급스러운 남색 */
      color: #FFD700;
      font-family: 'Inter', sans-serif;
    }

    /* 🔥 상단 네비게이션 */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 15px;
      padding: 18px 0;
      background-color: rgba(10,10,143,0.9);
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    nav a {
      padding: 8px 16px;
      text-decoration: none;
      color: #FFD700;
      font-weight: 500;
      border: 1.5px solid #FFD700;
      border-radius: 999px;
      font-size: 14px;
      transition: all 0.25s ease;
    }

    nav a:hover {
      background-color: #FFD700;
      color: #0a0a8f;
    }

    /* 🔥 메인 영역 */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 20px;
    }

    /* 🔥 타이틀 (핵심 포인트) */
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 56px;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    /* 🔥 서브텍스트 */
    p {
      font-size: 16px;
      opacity: 0.85;
      margin-bottom: 40px;
    }

    /* 🔥 이미지 */
    .hero img {
      width: 500px;
      max-width: 90%;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

  </style>
</head>

<body>

  <!-- 네비게이션 -->
  <nav>
    <a href="about.html">About</a>
    <a href="members.html">Members</a>
    <a href="archives.html">Archives</a>
    <a href="events.html">Events</a>
    <a href="blog.html">Blog</a>
    <a href="contact.html">Contact</a>
  </nav>

  <!-- 메인 (Hero Section) -->
  <div class="hero">

    <h1>EM-POWER HER</h1>

    <p>Empower Her, Empowered Us</p>

    <img src="./uranium_oxide.jpg">

  </div>

</body>
</html>
