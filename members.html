<!DOCTYPE html>
<html>
<head>
  <title>Members - EM-POWER HER</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background-color: #0a0a8f;
      color: #FFD700;
      font-family: 'Inter', sans-serif;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 15px;
      padding: 18px 0;
      background-color: rgba(10,10,143,0.9);
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    nav a {
      padding: 8px 16px;
      text-decoration: none;
      color: #FFD700;
      border: 1.5px solid #FFD700;
      border-radius: 999px;
      font-size: 14px;
      transition: 0.25s;
    }

    nav a:hover {
      background-color: #FFD700;
      color: #0a0a8f;
    }

    .container {
      padding-top: 120px;
      text-align: center;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      margin-bottom: 40px;
    }

    /* 🔥 카드 그리드 */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px;
      padding: 0 40px 60px;
    }

    /* 🔥 카드 */
    .card {
      background-color: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 20px;
      transition: 0.3s;
      backdrop-filter: blur(6px);
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .name {
      font-weight: 600;
      font-size: 18px;
    }

    .role {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 10px;
    }

    .links a {
      display: inline-block;
      margin: 5px;
      font-size: 13px;
      color: #FFD700;
      text-decoration: none;
      border-bottom: 1px solid transparent;
    }

    .links a:hover {
      border-bottom: 1px solid #FFD700;
    }

  </style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="archives.html">Archives</a>
  <a href="events.html">Events</a>
  <a href="blog.html">Blog</a>
  <a href="contact.html">Contact</a>
</nav>

<div class="container">

  <h1>Members</h1>

  <div class="grid">

    <!-- ⭐️ 카드 하나 템플릿 -->
    <div class="card">
      <img src="member1.png">
      <div class="name">Name</div>
      <div class="role">Role</div>
      <div class="links">
        <a href="mailto:chong23@ewha.ac.kr">Email</a>
        <a href="#">LinkedIn</a>
      </div>
    </div>

    <!-- 👉 이 카드 복붙해서 15명 만들면 됨 -->

  </div>

</div>

</body>
</html>
